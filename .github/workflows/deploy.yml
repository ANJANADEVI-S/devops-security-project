name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Test Backend ──────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check backend app imports correctly
        run: |
          cd backend
          python -c "import flask; print('Flask OK:', flask.__version__)"
          python -c "import hvac; print('Vault client OK')"
          python -c "import jwt; print('JWT OK')" || python -c "import flask_jwt_extended; print('JWT Extended OK')"

      - name: Lint backend with flake8
        run: |
          pip install flake8
          cd backend
          flake8 src/ --max-line-length=120 --exclude=__pycache__ || echo "Lint warnings — non-blocking"

  # ── Job 2: Test Frontend ─────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint || echo "Lint warnings — non-blocking"

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Verify build output
        run: |
          ls frontend/dist/
          echo "Frontend build successful"

  # ── Job 3: Security Scan ─────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .env files are not committed
        run: |
          if git ls-files | grep -E "^\.env$|^backend/\.env$|^monitoring/\.env$"; then
            echo "ERROR: .env files are tracked by git!"
            exit 1
          else
            echo "OK: No .env files committed"
          fi

      - name: Check for hardcoded secrets in Python files
        run: |
          echo "Scanning for hardcoded secrets..."
          grep -rn "password\s*=\s*['\"][^'\"]\+['\"]" backend/src/ || echo "No hardcoded passwords found"
          grep -rn "secret\s*=\s*['\"][^'\"]\+['\"]" backend/src/ || echo "No hardcoded secrets found"
          grep -rn "hvs\." backend/src/ && echo "WARNING: Possible Vault token in code!" || echo "No Vault tokens found"

      - name: Verify .gitignore covers sensitive files
        run: |
          if grep -q "\.env" .gitignore; then
            echo "OK: .gitignore covers .env files"
          else
            echo "WARNING: .env not in .gitignore"
          fi

  # ── Job 4: Validate Vault Config ─────────────────
  validate-vault:
    name: Validate Vault Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check vault.hcl exists
        run: |
          if [ -f vault/config/vault.hcl ]; then
            echo "OK: vault.hcl found"
            cat vault/config/vault.hcl
          else
            echo "ERROR: vault.hcl missing"
            exit 1
          fi

      - name: Check Vault folders exist
        run: |
          ls vault/
          echo "Vault structure OK"

  # ── Job 5: Validate Monitoring Config ────────────
  validate-monitoring:
    name: Validate Monitoring Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check prometheus.yml exists
        run: |
          if [ -f monitoring/prometheus/prometheus.yml ]; then
            echo "OK: prometheus.yml found"
            cat monitoring/prometheus/prometheus.yml
          else
            echo "ERROR: prometheus.yml missing"
            exit 1
          fi

      - name: Validate prometheus config syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/monitoring/prometheus:/etc/prometheus \
            prom/prometheus:latest \
            promtool check config /etc/prometheus/prometheus.yml

  # ── Job 6: Pipeline Summary ───────────────────────
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan, validate-vault, validate-monitoring]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "============================================"
          echo "        CI/CD Pipeline Complete             "
          echo "============================================"
          echo "Backend Tests      : ${{ needs.test-backend.result }}"
          echo "Frontend Build     : ${{ needs.test-frontend.result }}"
          echo "Security Scan      : ${{ needs.security-scan.result }}"
          echo "Vault Config       : ${{ needs.validate-vault.result }}"
          echo "Monitoring Config  : ${{ needs.validate-monitoring.result }}"
          echo "============================================"
          echo "Triggered by : ${{ github.actor }}"
          echo "Branch       : ${{ github.ref_name }}"
          echo "Commit       : ${{ github.sha }}"
          echo "============================================"