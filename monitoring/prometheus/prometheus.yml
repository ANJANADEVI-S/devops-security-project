global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'vault-custom-exporter'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'vault'
    metrics_path: '/v1/sys/metrics'
    params:
      format: ['prometheus']
    bearer_token: '${VAULT_TOKEN}'
    static_configs:
      - targets: ['127.0.0.1:8200']